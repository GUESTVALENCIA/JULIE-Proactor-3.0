appId: com.guestsvalencia.juliet-proactor
productName: "Juliet Proactor"
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  shortcutName: "Juliet Proactor"
  createDesktopShortcut: true
  createStartMenuShortcut: true
asar: true
